services:
  vaultbot:
    build: .
    container_name: vaultbot
    restart: unless-stopped
    ports:
      - "8080:8080"   # Webhook server (WhatsApp, Telegram, Teams)
      - "8081:8081"   # Healthcheck
      - "8082:8082"   # Dashboard
    volumes:
      # Persist bot data (memory, plugins, audit logs, trust store)
      - vaultbot-data:/home/vaultbot/.vaultbot
      # Mount config file if you have one (optional)
      # - ./config.yaml:/home/vaultbot/.vaultbot/config.yaml:ro
    env_file:
      - .env
    # Security: read-only root filesystem
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    # Security: drop all capabilities, add only what's needed
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      redis:
        condition: service_started
        required: false
    networks:
      - vaultbot-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Redis for multi-instance deployments
  redis:
    image: redis:7-alpine
    container_name: vaultbot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - vaultbot-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Optional: Ollama for local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: vaultbot-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - vaultbot-net
    profiles:
      - local-llm

volumes:
  vaultbot-data:
  redis-data:
  ollama-data:

networks:
  vaultbot-net:
    driver: bridge
