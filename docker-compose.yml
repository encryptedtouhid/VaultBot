version: "3.8"

services:
  zenbot:
    build: .
    container_name: zenbot
    restart: unless-stopped
    ports:
      - "8080:8080"   # Webhook server
      - "8081:8081"   # Healthcheck
    volumes:
      # Persist bot data (config, memory, plugins, audit logs)
      - zenbot-data:/home/zenbot/.zenbot
      # Mount config file (create with `zenbot init` first)
      # - ./config.yaml:/home/zenbot/.zenbot/config.yaml:ro
    environment:
      - ZENBOT_LOG_JSON=true
      - ZENBOT_LOG_LEVEL=INFO
    # Security: read-only root filesystem
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    # Security: drop all capabilities, add only what's needed
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # Optional: Redis for multi-instance deployments
  redis:
    image: redis:7-alpine
    container_name: zenbot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  zenbot-data:
  redis-data:
